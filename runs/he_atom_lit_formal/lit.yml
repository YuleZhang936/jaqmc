logging:
  level: info

workflow:
  seed: 1234
  batch_size: 4096
  config:
    ignore_extra: false
    verbose: false

system:
  module: atom
  symbol: He
  electron_init_width: 0.7
  basis: aug-cc-pVTZ

wf:
  module: jaqmc.app.molecule.wavefunction.ferminet
  ndets: 16
  hidden_dims_single: [64, 64, 64, 64]
  hidden_dims_double: [16, 16, 16, 16]
  use_last_layer: false
  envelope: abs_isotropic
  orbitals_spin_split: true
  full_det: true

sampler:
  steps: 20
  initial_width: 0.25
  adapt_frequency: 100

lit:
  eta: 0.003
  omega_min: 0.772
  omega_max: 0.787
  omega_points: 61
  axes: x
  output_filename: lit_spectrum.npz

  nqs_allow_untrained_ground: false
  nqs_ground_energy: null
  nqs_energy_steps: 32
  nqs_burn_in: 150

  nqs_source_center_steps: 64
  # Centered He has exact zero dipole expectation; a noisy MC center mixes an
  # unwanted even component into the odd dipole source.
  nqs_source_center_override: [0.0, 0.0, 0.0]
  nqs_source_norm_override: null
  nqs_source_burn_in: 150
  nqs_source_floor: 0.0001
  # The response has about 5.3e4 parameters.  The old 64-batch pool supplied
  # only about one effective walker per parameter after reweighting and
  # overfit every minibatch while held-out fidelity stayed flat.  Use a much
  # larger fixed training population and a separate 32-block evaluation pool.
  nqs_train_pool_batches: 512
  nqs_eval_pool_batches: 64
  nqs_pool_stride: 4
  # Hard parity evaluates the ansatz at X and IX.  Keep the measured safe
  # 1024 walkers per 80-GiB A100; on eight cards this becomes one global 8192
  # walker update/evaluation while frequency continuation remains serial.
  nqs_train_update_batch_size_per_device: 1024
  nqs_eval_batch_size_per_device: 1024
  nqs_data_parallel: local_devices
  nqs_source_pool_dir: ''
  # Metadata binds the exact walker count, ground-checkpoint content, and
  # nuclear geometry, rejecting every old or cross-system pool. Reuse the newly
  # generated centered 512/64 pools so multi-eta calculations can share
  # identical held-out jackknife blocks.
  nqs_reuse_source_pool: true
  nqs_save_source_pool: true
  # Fit the independent opposite-parity response NQS to Phi on the fixed
  # source pools before applying the resolvent action.
  nqs_source_distillation_iterations: 3000

  nqs_learning_rate: 0.002
  nqs_reverse_kl_weight: 1.0
  nqs_spring_epsilon: 0.001
  # The LIT PRL does not report mu; 0.99 is the general SPRING default.
  nqs_spring_decay: 0.99
  nqs_spring_damping_floor: 1.0e-12
  nqs_sr_max_norm: 0.02
  nqs_sr_score_eps: 1.0e-10
  nqs_warm_start_omega: -3.674932217565499
  nqs_warm_start_iterations: 1500
  # The published transfer-learning protocol advances only after held-out
  # fidelity has plateaued.  Establish the baseline at 1500 iterations, then
  # require 1000 further iterations without a cumulative 1e-5 improvement.
  # The tolerance is an engineering noise guard, not the LIT error bound.
  nqs_fidelity_plateau_start_iteration: 1500
  nqs_fidelity_plateau_patience_iterations: 1000
  nqs_fidelity_plateau_min_delta: 1.0e-5
  # The paper does not publish its hidden transfer grid.  Bridge adaptively
  # using |delta omega| sqrt(L / ||Phi||^2) <= 0.2, then verify on held-out
  # samples and bisect any step whose inherited fidelity drops too far.
  # Each bridge has a 6000-iteration ceiling; plateau stopping normally exits
  # earlier while preserving the best held-out checkpoint on the trajectory.
  nqs_continuation_iterations: 6000
  nqs_continuation_step_fraction: 0.2
  # Reuse the last accepted bridge step.  Grow by at most 25% only after a
  # clean, unbisected success; a recovered step is held for the next proposal.
  nqs_continuation_step_growth_factor: 1.25
  nqs_continuation_fidelity_retention: 0.95
  nqs_stage_reweight_ess_fraction_min: 0.05
  # At the numerical minimum step, allow a finite, ESS-valid inherited state
  # to enter recovery optimization.  Its best held-out checkpoint must remain
  # numerically valid, covariance-valid, and above the ESS guard.
  nqs_continuation_allow_min_step_override: true
  # null -> min(0.2 * eta, the reported spectrum spacing) = 0.00025 Ha.
  nqs_continuation_min_step: null
  nqs_continuation_max_points: 1000
  nqs_iterations: 6000
  nqs_selection_interval: 100
  nqs_log_interval: 100

  nqs_response_ndets: 16
  nqs_response_hidden_dims_single: [64, 64, 64, 64]
  nqs_response_hidden_dims_double: [16, 16, 16, 16]
  nqs_response_use_last_layer: false
  nqs_response_envelope: abs_isotropic
  nqs_response_orbitals_spin_split: true
  # For an atom, diagnose the checkpoint's inversion parity and hard-project
  # the independent scalar response into the opposite parity. A genuinely C1
  # molecule remains unconstrained.
  # The response parity is exact by construction. Reject a sampled atomic
  # source that is inconsistent with the diagnosed opposite-parity sector.
  nqs_atomic_source_parity_max_loss: 1.0e-3
  nqs_atomic_ground_parity_max_loss: 1.0e-3
