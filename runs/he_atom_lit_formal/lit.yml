logging:
  level: info

workflow:
  seed: 1234
  batch_size: 4096
  config:
    ignore_extra: false
    verbose: false

system:
  module: atom
  symbol: He
  electron_init_width: 0.7
  basis: aug-cc-pVTZ

wf:
  module: jaqmc.app.molecule.wavefunction.ferminet
  ndets: 16
  hidden_dims_single: [64, 64, 64, 64]
  hidden_dims_double: [16, 16, 16, 16]
  use_last_layer: false
  envelope: abs_isotropic
  orbitals_spin_split: true
  full_det: true

sampler:
  steps: 20
  initial_width: 0.25
  adapt_frequency: 100

lit:
  eta: 0.003
  omega_min: 0.772
  omega_max: 0.787
  omega_points: 61
  axes: x
  output_filename: lit_spectrum.npz
  peak_min_height_fraction: 0.02
  preview_roots: 12
  # The published transfer-learning protocol is one global predecessor chain.
  scan_parallel: "off"

  nqs_allow_untrained_ground: false
  nqs_ground_energy: null
  nqs_energy_steps: 32
  nqs_burn_in: 150

  nqs_source_center_steps: 64
  # Centered He has exact zero dipole expectation; a noisy MC center mixes an
  # unwanted even component into the odd dipole source.
  nqs_source_center_override: [0.0, 0.0, 0.0]
  nqs_source_norm_override: null
  nqs_source_burn_in: 150
  nqs_source_floor: 0.0001
  nqs_train_pool_batches: 64
  nqs_eval_pool_batches: 16
  nqs_pool_stride: 4
  # Hard parity evaluates the ansatz at X and IX.  Batch 1024 uses about
  # 61 GiB on one 80-GiB A100; the previous 4096 setting is not viable.
  nqs_train_update_batch_size: 1024
  nqs_eval_batch_size: 1024
  nqs_source_pool_dir: ''
  # The previous pools were generated with a nonzero center and are incompatible.
  nqs_reuse_source_pool: false
  nqs_save_source_pool: true
  # The PRL uses pi_Phi samples with action-state importance reweighting.
  nqs_reweight_ess_fraction_min: 0.0
  nqs_direct_psi_train: false
  nqs_direct_psi_burn_in: 10
  nqs_direct_psi_batches: 1
  nqs_direct_psi_train_batches: 2
  nqs_direct_psi_eval_batches: 8
  nqs_direct_psi_stride: 2

  nqs_learning_rate: 0.002
  nqs_reverse_kl_weight: 1.0
  nqs_spring_epsilon: 0.001
  # The LIT PRL does not report mu; 0.99 is the general SPRING default.
  nqs_spring_decay: 0.99
  nqs_spring_damping_floor: 1.0e-12
  nqs_sr_max_norm: 0.02
  nqs_sr_score_eps: 1.0e-10
  nqs_warm_start_omega: -3.674932217565499
  nqs_warm_start_iterations: 1500
  # The paper does not publish its hidden transfer grid.  Bridge adaptively
  # using |delta omega| sqrt(L / ||Phi||^2) <= 0.2, then verify on held-out
  # samples and bisect any step whose inherited fidelity drops too far.
  nqs_continuation_iterations: 1500
  nqs_continuation_step_fraction: 0.2
  nqs_continuation_fidelity_retention: 0.95
  # Never propagate a merely finite but scientifically unusable response.
  # Below the floor, a stage must also recover at least 0.001 fidelity; an
  # already-good inherited checkpoint is allowed to remain at iteration zero.
  nqs_stage_fidelity_min: 0.99
  nqs_stage_reweight_ess_fraction_min: 0.05
  nqs_stage_fidelity_gain_min: 0.001
  # A failed probe at the numerical minimum step is a real stop condition,
  # not permission to compound fidelity loss down the serial chain.
  nqs_continuation_allow_min_step_override: false
  # null -> min(0.2 * eta, the reported spectrum spacing) = 0.00025 Ha.
  nqs_continuation_min_step: null
  nqs_continuation_max_points: 256
  nqs_iterations: 6000
  nqs_selection_interval: 100
  nqs_log_interval: 100

  nqs_response_ndets: 16
  nqs_response_hidden_dims_single: [64, 64, 64, 64]
  nqs_response_hidden_dims_double: [16, 16, 16, 16]
  nqs_response_use_last_layer: false
  nqs_response_envelope: abs_isotropic
  nqs_response_orbitals_spin_split: true
  # Initialize at the large-negative-frequency source solution.  For an atom,
  # diagnose the checkpoint's inversion parity and hard-project the scalar
  # response into the opposite parity.  A genuinely C1 molecule remains
  # unconstrained.
  nqs_source_aligned: true
  nqs_source_aligned_residual_scale: 1.0e-2
  nqs_source_symmetry_mode: atom_c1
  nqs_source_symmetry_weight: 0.0
  # This is now only a diagnostic inversion guard on the sampled atomic source;
  # the response parity itself is exact by construction and has no soft loss.
  nqs_source_symmetry_max_covariance: 1.0e-3
  nqs_atomic_ground_parity_max_loss: 1.0e-3
