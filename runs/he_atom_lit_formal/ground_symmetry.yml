logging:
  level: info

workflow:
  seed: 1234
  batch_size: 4096
  config:
    ignore_extra: false
    verbose: false

system:
  module: atom
  symbol: He
  electron_init_width: 0.7
  basis: aug-cc-pVTZ

wf:
  module: jaqmc.app.molecule.wavefunction.ferminet
  ndets: 16
  hidden_dims_single: [64, 64, 64, 64]
  hidden_dims_double: [16, 16, 16, 16]
  use_last_layer: false
  envelope: abs_isotropic
  orbitals_spin_split: true
  full_det: true

sampler:
  steps: 20
  initial_width: 0.25
  adapt_frequency: 100

ground_symmetry:
  enabled: true
  # The from-scratch A/B reached the 1e-3 covariance gate without auxiliary
  # dynamics and beat the treatment on worst-operation covariance.  Keep the
  # complete diagnostics active, but reserve updates/global moves as a fallback.
  updates_enabled: false
  global_mcmc_enabled: false
  irrep: a1
  geometry_tolerance: 1.0e-5
  linear_random_operation_pairs: 8
  atom_random_rotation_quartets: 8
  operation_seed: 1729
  pretrain_enabled: true
  pretrain_update_interval: 4
  pretrain_learning_rate: 1.0e-3
  pretrain_source_weight_beta: 0.05
  pretrain_source_weight_warmup_steps: 500
  train_update_interval: 4
  train_learning_rate: 1.0e-3
  train_source_weight_beta: 0.25
  train_source_weight_warmup_steps: 5000
  update_batch_size: 64
  source_weight_min: 1.0e-3
  source_weight_max: 10.0
  log_amplitude_huber_delta: 1.0
  covariance_training_weight: 0.1
  max_update_norm: 1.0e-3
  energy_update_trust_ratio: 0.05
  evaluation_interval: 500
  maximum_covariance: 1.0e-3
  mcmc_global_step_interval: 5

pretrain:
  run:
    burn_in: 200
    iterations: 2000
    save_step_interval: 500
    save_time_interval: 600
  optim:
    learning_rate:
      rate: 0.0003
      delay: 2000
      decay: 1.0
  writers:
    console:
      interval: 20
      fields: loss:.6f,sym=ground_symmetry_covariance_loss:.3e,sym_update=ground_symmetry_update_norm:.2e

train:
  run:
    burn_in: 500
    iterations: 50000
    save_step_interval: 500
    save_time_interval: 600
  optim:
    learning_rate:
      rate: 0.02
      delay: 10000
      decay: 1.0
    damping: 0.001
    norm_constraint: 0.001
    curvature_ema: 0.95
    inverse_update_period: 1
  writers:
    console:
      interval: 20
      fields: pmove:.3f,energy=total_energy:.8f,variance=total_energy_var:.6f,sym=ground_symmetry_covariance_loss:.3e,sym_update=ground_symmetry_update_norm:.2e
